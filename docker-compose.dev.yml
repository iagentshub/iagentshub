# docker-compose.dev.yml — Overrides para desarrollo local
#
# Usa rutas locales en lugar de GitHub para backend, frontend, skills y agentes.
# Las rutas son relativas a este fichero (por defecto ../backend, ../frontend, etc.).
# Se pueden sobreescribir en .env con las variables DEV_*_REPO.
#
# Uso:
#   ./gaia.sh start --dev
#   ./gaia.sh update --dev

services:

  # En dev, data-init copia skills y agentes desde repos locales en vez de clonar GitHub.
  data-init:
    volumes:
      - type: bind
        source: ${DEV_SKILLS_REPO:-../skills}
        target: /skills-src
        read_only: true
      - type: bind
        source: ${DEV_AGENTS_REPO:-../agents}
        target: /agents-src
        read_only: true
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo '[data-init] Modo dev: sincronizando skills y agentes desde repos locales...'
        mkdir -p /data/skills/public /data/skills/private /data/agents/public /data/agents/private /data/connections /data/memory
        if [ ! -f /data/settings.json ]; then
          RANDOM_SECRET=$$(cat /dev/urandom | tr -dc 'a-f0-9' | head -c 64)
          printf '{"jwt_secret":"%s"}\n' "$$RANDOM_SECRET" > /data/settings.json
        fi
        if [ ! -f /data/connections/connections.json ]; then
          printf '[]\n' > /data/connections/connections.json
        fi
        SRC="/skills-src/public/$$SKILLS_LANG"
        if [ -d "$$SRC" ]; then
          cp -r "$$SRC"/. /data/skills/public/
        else
          cp -r /skills-src/public/. /data/skills/public/
        fi
        rm -rf /data/agents/public/*
        AGENTS_SRC="/agents-src/public/$$SKILLS_LANG"
        if [ -d "$$AGENTS_SRC" ]; then
          cp -r "$$AGENTS_SRC"/. /data/agents/public/
        elif [ -d /agents-src/public ]; then
          cp -r /agents-src/public/. /data/agents/public/
        else
          cp -r /agents-src/. /data/agents/public/
        fi
        echo '[data-init] Listo.'

  # En dev, code-sync no clona desde GitHub: simplemente deja el volumen listo
  # para que el healthcheck que espera backend y frontend pueda pasar.
  code-sync:
    command:
      - /bin/sh
      - -c
      - "echo '[code-sync] dev mode: sin sync de GitHub.'"
    restart: "no"
    healthcheck:
      disable: true

  # Backend: imagen construida desde el repo local, código montado como bind mount.
  # El bind mount sobreescribe el volumen nombrado en /app — el código local siempre gana.
  # code-sync se sobreescribe a service_completed_successfully porque en dev sale inmediatamente.
  backend:
    depends_on:
      code-sync:
        condition: service_completed_successfully
    build:
      context: "${DEV_BACKEND_REPO:-../backend}"
      dockerfile_inline: |
        FROM python:3.12-slim AS builder
        WORKDIR /build
        COPY requirements.txt .
        RUN pip install --no-cache-dir --prefix=/install -r requirements.txt

        FROM python:3.12-slim
        WORKDIR /app
        COPY --from=builder /install /usr/local
        EXPOSE 8765
        CMD ["python", "main.py"]
    environment:
      GAIA_RELOAD: "true"
      GAIA_REGISTRATION: "open"
      GAIA_ADMIN_EMAIL: "andresdavidh11@gmail.com"
      GAIA_ADMIN_RESET: ""
    volumes:
      - type: bind
        source: ${DEV_BACKEND_REPO:-../backend}
        target: /app

  # Frontend: imagen nginx construida desde el repo local, ficheros estáticos como bind mount.
  # El bind mount sobreescribe el volumen nombrado en /usr/share/nginx/html.
  frontend:
    depends_on:
      code-sync:
        condition: service_completed_successfully
    build:
      context: "${DEV_FRONTEND_REPO:-../frontend}"
      dockerfile_inline: |
        FROM nginx:alpine
        RUN rm -f /usr/share/nginx/html/index.html /usr/share/nginx/html/50x.html
        EXPOSE 80
    volumes:
      - type: bind
        source: ${DEV_FRONTEND_REPO:-../frontend}
        target: /usr/share/nginx/html
        read_only: true
